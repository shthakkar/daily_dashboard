<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Market Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      color: #555;
      margin-bottom: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      min-width: 220px;
      text-align: center;
    }
    .card-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #555;
      margin-bottom: 1rem;
    }
    .card-label {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    .card-sub { font-size: 0.8rem; color: #555; }
    .bullish  { color: #22c55e; }
    .bearish  { color: #ef4444; }
    .low      { color: #22c55e; }
    .normal   { color: #eab308; }
    .elevated { color: #f97316; }
    .crisis   { color: #ef4444; }
    #date-line {
      margin-top: 2.5rem;
      font-size: 0.7rem;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .watchlists {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 2.5rem;
    }
    .watchlist {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.25rem 1.75rem;
      min-width: 180px;
    }
    .watchlist-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #555;
      margin-bottom: 0.85rem;
    }
    .tickers { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .ticker {
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
      user-select: none;
      text-decoration: none;
    }
    .ticker:hover { opacity: 0.75; }
    .ticker.long  { background: #0d2e1a; color: #22c55e; border: 1px solid #22c55e33; }
    .ticker.short { background: #2e0d0d; color: #ef4444; border: 1px solid #ef444433; }
    #chart-popup {
      display: none;
      position: fixed;
      z-index: 9999;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 32px #00000088;
      border: 1px solid #2a2a2a;
    }
    .scanners {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-top: 2.5rem;
      width: 100%;
      max-width: 900px;
    }
    .scanner-section { }
    .scanner-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #555;
      margin-bottom: 0.85rem;
    }
    .scanner-bands {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .scanner-band {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.25rem 1.75rem;
      min-width: 190px;
      flex: 1;
    }
    .scanner-band-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #444;
      margin-bottom: 0.75rem;
    }
    .scanner-table {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
    }
    .s-head, .s-row {
      display: grid;
      align-items: center;
      padding: 0.5rem 1.5rem;
      gap: 0.75rem;
    }
    .s-head {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #3a3a3a;
      border-bottom: 1px solid #222;
    }
    .s-row { border-bottom: 1px solid #1e1e1e; }
    .s-row:last-child { border-bottom: none; }
    .qualla-grid { grid-template-columns: 90px 55px 1fr 90px; }
    .rs-grid     { grid-template-columns: 90px repeat(4, 1fr); }
    .para-grid   { grid-template-columns: 90px 1fr 1fr; }
    .s-cell      { font-size: 0.8rem; color: #888; white-space: nowrap; }
    .s-cell.dim  { color: #555; }
    .scanner-na  { font-size: 0.8rem; color: #333; display: block; padding: 1rem 1.5rem; }
  </style>
</head>
<body>
  <h1>Market Dashboard</h1>

  <div class="cards">
    <div class="card">
      <div class="card-title">Market Direction</div>
      <div id="direction-label" class="card-label bullish">BULLISH</div>
      <div id="direction-sub" class="card-sub">10EMA: 742.41 &nbsp;|&nbsp; 20EMA: 740.80</div>
    </div>
    <div class="card">
      <div class="card-title">Volatility</div>
      <div id="vix-label" class="card-label normal">NORMAL</div>
      <div id="vix-sub" class="card-sub">VIX: 16.78</div>
    </div>
  </div>

  <div id="date-line">Last updated: 2026-06-19</div>

  <div class="watchlists">
    <div class="watchlist">
      <div class="watchlist-title">Long Watchlist</div>
      <div class="tickers">
        <a class="ticker long" data-symbol="NYSE:PL" href="https://www.tradingview.com/chart/?symbol=NYSE%3APL" target="_blank" rel="noopener">PL</a>
      </div>
    </div>
    <div class="watchlist">
      <div class="watchlist-title">Short Watchlist</div>
      <div class="tickers">
        <a class="ticker short" data-symbol="NASDAQ:BIRD" href="https://www.tradingview.com/chart/?symbol=NASDAQ%3ABIRD" target="_blank" rel="noopener">BIRD</a>
      </div>
    </div>
  </div>

  <div class="scanners">

    <div class="scanner-section">
      <div class="scanner-title">Parabolic Short Setups</div>
      <div class="scanner-bands" id="parabolic-bands">
        <span class="scanner-na">Loading...</span>
      </div>
    </div>

    <div class="scanner-section">
      <div class="scanner-title">Qullamaggie — MA Tightness</div>
      <div class="scanner-table" id="qullamaggie-rows">
        <span class="scanner-na">Loading...</span>
      </div>
    </div>

    <div class="scanner-section">
      <div class="scanner-title">Relative Strength</div>
      <div class="scanner-table" id="rs-rows">
        <span class="scanner-na">Loading...</span>
      </div>
    </div>

  </div>

  <div id="chart-popup">
    <iframe id="chart-frame" width="600" height="400" frameborder="0" scrolling="no"></iframe>
  </div>

  <script>
    const SIGNAL_CLS = new Set(['bullish', 'bearish']);
    const VIX_CLS    = new Set(['low', 'normal', 'elevated', 'crisis']);

    function safe(s) {
      return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }

    function makeTicker(symbol, cssClass) {
      const a = document.createElement('a');
      a.className = 'ticker ' + cssClass;
      a.textContent = symbol;
      a.dataset.symbol = symbol;
      a.href = 'https://www.tradingview.com/chart/?symbol=' + encodeURIComponent(symbol);
      a.target = '_blank';
      a.rel = 'noopener';
      return a;
    }

    fetch('data/latest.json')
      .then(r => r.json())
      .then(d => {
        const sig = SIGNAL_CLS.has(d.spy_ema) ? d.spy_ema : 'bearish';
        const dirLabel = document.getElementById('direction-label');
        dirLabel.className = 'card-label ' + sig;
        dirLabel.textContent = sig.toUpperCase();
        document.getElementById('direction-sub').innerHTML =
          '10EMA: ' + safe(d.spy_10ema) + ' &nbsp;|&nbsp; 20EMA: ' + safe(d.spy_20ema);

        const lvl = VIX_CLS.has(d.vix_level) ? d.vix_level : 'normal';
        const vixLabel = document.getElementById('vix-label');
        vixLabel.className = 'card-label ' + lvl;
        vixLabel.textContent = lvl.toUpperCase();
        document.getElementById('vix-sub').textContent = 'VIX: ' + safe(d.vix);

        document.getElementById('date-line').textContent = 'Last updated: ' + safe(d.date);
      })
      .catch(() => {});

    fetch('data/parabolic_short.json')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var container = document.getElementById('parabolic-bands');
        container.innerHTML = '';
        d.bands.forEach(function(band) {
          var bandDiv = document.createElement('div');
          bandDiv.className = 'scanner-band';
          var title = document.createElement('div');
          title.className = 'scanner-band-title';
          title.textContent = band.label;
          bandDiv.appendChild(title);
          if (!band.tickers.length) {
            var na = document.createElement('span');
            na.className = 'scanner-na';
            na.style.padding = '0';
            na.textContent = 'No data';
            bandDiv.appendChild(na);
          } else {
            var head = document.createElement('div');
            head.className = 's-head para-grid';
            head.style.padding = '0.35rem 0';
            ['Ticker', '1W', '1M'].forEach(function(h) {
              var c = document.createElement('span'); c.textContent = h; head.appendChild(c);
            });
            bandDiv.appendChild(head);
            band.tickers.forEach(function(t) {
              var row = document.createElement('div');
              row.className = 's-row para-grid';
              row.style.padding = '0.35rem 0';
              row.style.borderBottom = '1px solid #1e1e1e';
              var c1 = document.createElement('div'); c1.appendChild(makeTicker(t.ticker, 'short')); row.appendChild(c1);
              var c2 = document.createElement('span'); c2.className = 's-cell'; c2.textContent = safe(t.perf_week); row.appendChild(c2);
              var c3 = document.createElement('span'); c3.className = 's-cell'; c3.textContent = safe(t.perf_month); row.appendChild(c3);
              bandDiv.appendChild(row);
            });
          }
          container.appendChild(bandDiv);
        });
        attachScannerPopups();
      })
      .catch(function() {
        document.getElementById('parabolic-bands').innerHTML = '<span class="scanner-na">Data unavailable</span>';
      });

    fetch('data/qullamaggie.json')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var container = document.getElementById('qullamaggie-rows');
        container.innerHTML = '';
        if (!d.stocks.length) {
          container.innerHTML = '<span class="scanner-na">No results</span>';
          return;
        }
        var head = document.createElement('div');
        head.className = 's-head qualla-grid';
        ['Ticker', 'Score', 'Rating', 'Close'].forEach(function(h) {
          var c = document.createElement('span'); c.textContent = h; head.appendChild(c);
        });
        container.appendChild(head);
        d.stocks.forEach(function(s) {
          var row = document.createElement('div');
          row.className = 's-row qualla-grid';
          var c1 = document.createElement('div'); c1.appendChild(makeTicker(s.ticker, 'long')); row.appendChild(c1);
          var c2 = document.createElement('span'); c2.className = 's-cell'; c2.textContent = safe(String(s.tightness)); row.appendChild(c2);
          var c3 = document.createElement('span'); c3.className = 's-cell dim'; c3.textContent = safe(s.rating); row.appendChild(c3);
          var c4 = document.createElement('span'); c4.className = 's-cell'; c4.textContent = '$' + safe(String(s.close)); row.appendChild(c4);
          container.appendChild(row);
        });
        attachScannerPopups();
      })
      .catch(function() {
        document.getElementById('qullamaggie-rows').innerHTML = '<span class="scanner-na">Data unavailable</span>';
      });

    fetch('data/relative_strength.json')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var container = document.getElementById('rs-rows');
        container.innerHTML = '';
        if (!d.stocks.length) {
          container.innerHTML = '<span class="scanner-na">No results</span>';
          return;
        }
        var head = document.createElement('div');
        head.className = 's-head rs-grid';
        ['Ticker', '1M', '3M', '6M', '9M'].forEach(function(h) {
          var c = document.createElement('span'); c.textContent = h; head.appendChild(c);
        });
        container.appendChild(head);
        d.stocks.forEach(function(s) {
          var row = document.createElement('div');
          row.className = 's-row rs-grid';
          var c1 = document.createElement('div'); c1.appendChild(makeTicker(s.ticker, 'long')); row.appendChild(c1);
          [s.ret_1m, s.ret_3m, s.ret_6m, s.ret_9m].forEach(function(v) {
            var c = document.createElement('span'); c.className = 's-cell'; c.textContent = safe(v); row.appendChild(c);
          });
          container.appendChild(row);
        });
        attachScannerPopups();
      })
      .catch(function() {
        document.getElementById('rs-rows').innerHTML = '<span class="scanner-na">Data unavailable</span>';
      });
  </script>

  <script>
    const popup = document.getElementById('chart-popup');
    const frame = document.getElementById('chart-frame');
    let hideTimer;

    const isTouch = () => 'ontouchstart' in window;

    function tvEmbedUrl(symbol) {
      return 'https://s.tradingview.com/widgetembed/?symbol=' + encodeURIComponent(symbol)
        + '&interval=D&theme=dark&style=1&locale=en&enable_publishing=false&save_image=false';
    }

    function tvPageUrl(symbol) {
      return 'https://www.tradingview.com/chart/?symbol=' + encodeURIComponent(symbol);
    }

    function showPopup(el) {
      clearTimeout(hideTimer);
      const symbol = el.dataset.symbol;
      if (frame.dataset.current !== symbol) {
        frame.src = tvEmbedUrl(symbol);
        frame.dataset.current = symbol;
      }
      const rect = el.getBoundingClientRect();
      const popupW = 600;
      let left = rect.left + window.scrollX;
      if (left + popupW > window.innerWidth - 16) left = window.innerWidth - popupW - 16;
      popup.style.left = Math.max(8, left) + 'px';
      popup.style.top = (rect.bottom + window.scrollY + 8) + 'px';
      popup.style.display = 'block';
    }

    function hidePopup() {
      hideTimer = setTimeout(function() {
        popup.style.display = 'none';
        frame.dataset.current = '';
      }, 200);
    }

    function attachScannerPopups() {
      document.querySelectorAll('.scanners .ticker').forEach(function(el) {
        if (el.dataset.popupAttached) return;
        el.dataset.popupAttached = '1';
        el.addEventListener('mouseenter', function() { if (!isTouch()) showPopup(el); });
        el.addEventListener('mouseleave', function() { if (!isTouch()) hidePopup(); });
        el.addEventListener('click', function(e) { if (!isTouch()) e.preventDefault(); });
      });
    }

    document.querySelectorAll('.ticker').forEach(function(el) {
      // Desktop: hover shows iframe popup, click prevented (link still opens on mobile)
      el.addEventListener('mouseenter', function() { if (!isTouch()) showPopup(el); });
      el.addEventListener('mouseleave', function() { if (!isTouch()) hidePopup(); });
      el.addEventListener('click', function(e) { if (!isTouch()) e.preventDefault(); });
    });

    popup.addEventListener('mouseenter', function() { clearTimeout(hideTimer); });
    popup.addEventListener('mouseleave', hidePopup);
  </script>
</body>
</html>
