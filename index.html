<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Market Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      color: #555;
      margin-bottom: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      min-width: 220px;
      text-align: center;
    }
    .card-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #555;
      margin-bottom: 1rem;
    }
    .card-label {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }
    .card-sub { font-size: 0.8rem; color: #555; }
    .bullish  { color: #22c55e; }
    .bearish  { color: #ef4444; }
    .low      { color: #22c55e; }
    .normal   { color: #eab308; }
    .elevated { color: #f97316; }
    .crisis   { color: #ef4444; }
    #date-line {
      margin-top: 2.5rem;
      font-size: 0.7rem;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .watchlists {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 2.5rem;
    }
    .watchlist {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.25rem 1.75rem;
      min-width: 180px;
    }
    .watchlist-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #555;
      margin-bottom: 0.85rem;
    }
    .tickers { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .ticker {
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
      user-select: none;
      text-decoration: none;
    }
    .ticker:hover { opacity: 0.75; }
    .ticker.long  { background: #0d2e1a; color: #22c55e; border: 1px solid #22c55e33; }
    .ticker.short { background: #2e0d0d; color: #ef4444; border: 1px solid #ef444433; }
    #chart-popup {
      display: none;
      position: fixed;
      z-index: 9999;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 32px #00000088;
      border: 1px solid #2a2a2a;
    }
  </style>
</head>
<body>
  <h1>Market Dashboard</h1>

  <div class="cards">
    <div class="card">
      <div class="card-title">Market Direction</div>
      <div class="card-label bullish">BULLISH</div>
      <div class="card-sub">10EMA: 742.41 &nbsp;|&nbsp; 20EMA: 740.80</div>
    </div>
    <div class="card">
      <div class="card-title">Volatility</div>
      <div class="card-label normal">NORMAL</div>
      <div class="card-sub">VIX: 16.78</div>
    </div>
  </div>

  <div id="date-line">Last updated: 2026-06-19</div>

  <div class="watchlists">
    <div class="watchlist">
      <div class="watchlist-title">Long Watchlist</div>
      <div class="tickers">
        <a class="ticker long" data-symbol="NYSE:PL" href="https://www.tradingview.com/chart/?symbol=NYSE%3APL" target="_blank" rel="noopener">PL</a>
      </div>
    </div>
    <div class="watchlist">
      <div class="watchlist-title">Short Watchlist</div>
      <div class="tickers">
        <a class="ticker short" data-symbol="NASDAQ:BIRD" href="https://www.tradingview.com/chart/?symbol=NASDAQ%3ABIRD" target="_blank" rel="noopener">BIRD</a>
      </div>
    </div>
  </div>

  <div id="chart-popup">
    <iframe id="chart-frame" width="600" height="400" frameborder="0" scrolling="no"></iframe>
  </div>

  <script>
    const popup = document.getElementById('chart-popup');
    const frame = document.getElementById('chart-frame');
    let hideTimer;

    const isTouch = () => 'ontouchstart' in window;

    function tvEmbedUrl(symbol) {
      return 'https://s.tradingview.com/widgetembed/?symbol=' + encodeURIComponent(symbol)
        + '&interval=D&theme=dark&style=1&locale=en&enable_publishing=false&save_image=false';
    }

    function tvPageUrl(symbol) {
      return 'https://www.tradingview.com/chart/?symbol=' + encodeURIComponent(symbol);
    }

    function showPopup(el) {
      clearTimeout(hideTimer);
      const symbol = el.dataset.symbol;
      if (frame.dataset.current !== symbol) {
        frame.src = tvEmbedUrl(symbol);
        frame.dataset.current = symbol;
      }
      const rect = el.getBoundingClientRect();
      const popupW = 600;
      let left = rect.left + window.scrollX;
      if (left + popupW > window.innerWidth - 16) left = window.innerWidth - popupW - 16;
      popup.style.left = Math.max(8, left) + 'px';
      popup.style.top = (rect.bottom + window.scrollY + 8) + 'px';
      popup.style.display = 'block';
    }

    function hidePopup() {
      hideTimer = setTimeout(function() {
        popup.style.display = 'none';
        frame.dataset.current = '';
      }, 200);
    }

    document.querySelectorAll('.ticker').forEach(function(el) {
      // Desktop: hover shows iframe popup, click prevented (link still opens on mobile)
      el.addEventListener('mouseenter', function() { if (!isTouch()) showPopup(el); });
      el.addEventListener('mouseleave', function() { if (!isTouch()) hidePopup(); });
      el.addEventListener('click', function(e) { if (!isTouch()) e.preventDefault(); });
    });

    popup.addEventListener('mouseenter', function() { clearTimeout(hideTimer); });
    popup.addEventListener('mouseleave', hidePopup);
  </script>
</body>
</html>
